[General]
network = HospitalNet
#abstract-config = true (requires omnet 7)
*.configurator.addStaticArpEntries = true
*.configurator.optimizeRoutes = false
*.configurator.assignAddresses = true

# Veri Kaydı Ayarları
**.vector-recording = true
**.scalar-recording = true
**.bin-recording = true

# İstatistikleri Toplama Talimatı
**.app[*].rcvdPkFromHL:vector.vector-recording = true
**.app[*].sentPk:vector.vector-recording = true

# random
num-rngs = 3
*.host[*].mobility.rng-0 = 1
*.host[*].wlan[*].mac.rng-0 = 2



# visualizer
*.visualizer.*.mediumVisualizer.displaySignals = false
*.visualizer.*.mediumVisualizer.displaySignalDepartures = false
*.visualizer.*.mediumVisualizer.displaySignalArrivals = false
*.visualizer.canvasVisualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.canvasVisualizer.dataLinkVisualizer.packetNameFilter = "UdpBasicAppMsg"
*.visualizer.canvasVisualizer.dataLinkVisualizer.nodeFilter = "host* or monitor*"


# physical environment
*.physicalEnvironment.spaceMinX = 0m
*.physicalEnvironment.spaceMinY = 0m
*.physicalEnvironment.spaceMinZ = -1000m
*.physicalEnvironment.spaceMaxX = 1000m
*.physicalEnvironment.spaceMaxY = 1000m
*.physicalEnvironment.spaceMaxZ = 1000m

# radio medium
*.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"
# Medya Tipi
*.radioMedium.typename = "RadioMedium"
# Arka plan gürültü seviyesi (Sorulan parametre budur)
*.radioMedium.backgroundNoise.power = -110dBm

# Diğer olası soruları engellemek için şu temel ayarları da ekleyebilirsin:
**.wlan[0].radio.displayInterferenceRange = false
**.wlan[0].radio.displayCommunicationRange = true

# Düğümlerin (Monitor ve Host) Kablosuz Kart Ayarı
**.wlan[0].typename = "Ieee802154NarrowbandInterface"
**.wlan[0].mac.typename = "Ieee802154Mac"
**.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"




[Config Outdoor]
description = "Wireless nodes send pings while moving around the streets"
# Tanışma faslını geç, direkt veriyi gönder
**.arp.typename = "GlobalArp"
# host
*.numHosts = 8
*.numMonitors = 16
# --- SADECE MONİTÖR-HEMŞİRE VERİ AKIŞI GÖRÜNSÜN ---
*.visualizer.canvasVisualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.canvasVisualizer.dataLinkVisualizer.packetNameFilter = "UdpBasicAppMsg*"

# Sadece ve sadece UDP paketlerini göster, geri kalan her şeyi YASAKLA
*.visualizer.canvasVisualizer.dataLinkVisualizer.packetFilter = "UdpBasicAppMsg"
*.visualizer.canvasVisualizer.networkRouteVisualizer.packetFilter = "UdpBasicAppMsg"
# Visualizer'a sadece monitor->host arası bağlantıları çizdir
*.visualizer.canvasVisualizer.dataLinkVisualizer.nodeFilter = "host* or monitor*"
# Sinyal çizgileri saniyenin onda biri kadar görünsün ve kaybolsun
*.visualizer.canvasVisualizer.dataLinkVisualizer.holdTime = 0.1s

# Kırmızı halkaları (sinyal yayılımını) tamamen kapatıyoruz
*.visualizer.canvasVisualizer.mediumVisualizer.displaySignals = false 

# Ekrandaki dBW yazılarını ve gereksiz metinleri temizlemek için:
*.visualizer.canvasVisualizer.mediumVisualizer.displayTransmissions = false

# Kamera ve harita ayarların (Aynı kalsın)
*.visualizer.canvasVisualizer.sceneVisualizer.axisLength = 500m
*.visualizer.canvasVisualizer.sceneVisualizer.viewTranslation = "25000 0"
# Bu satır herkesin IP'sini en başta birbirine tanıtır, "Sen kimsin?" diye sormayı keser

*.configurator.addStaticArpEntries = true
*.configurator.optimizeRoutes = false
*.configurator.assignAddresses = true
*.configurator.assignDispatchedAddresses = true
*.configurator.addStaticRoutes = true



*.physicalEnvironment.config = xmldoc("outdoor.xml")



# wlan
*.host[*].wlan[*].radio.transmitter.power = 5mW
# Arka plan gürültü seviyesi (Sorulan parametre budur)
*.radioMedium.backgroundNoise.power = -110dBm

# Diğer olası soruları engellemek için şu temel ayarları da ekleyebilirsin:
**.wlan[0].radio.displayInterferenceRange = false
**.wlan[0].radio.displayCommunicationRange = true
# Medya Tipi
*.radioMedium.typename = "RadioMedium"

# Düğümlerin (Monitor ve Host) Kablosuz Kart Ayarı
**.wlan[0].typename = "Ieee802154NarrowbandInterface"
**.wlan[0].mac.typename = "Ieee802154Mac"
**.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"

# mobility

# Yatay hareket alanı (Tüm odalar için ortak)
*.host[*].mobility.constraintAreaMinX = 50m
*.host[*].mobility.constraintAreaMaxX = 850m
*.host[*].mobility.constraintAreaMinZ = 0m
*.host[*].mobility.constraintAreaMaxZ = 0m

# Kat Bazlı Dikey Sınırlar (Her host farklı bir şeritte)
*.host[0].mobility.constraintAreaMinY = 50m
*.host[0].mobility.constraintAreaMaxY = 140m
*.host[4].mobility.constraintAreaMinY = 50m
*.host[4].mobility.constraintAreaMaxY = 140m

*.host[1].mobility.constraintAreaMinY = 160m
*.host[1].mobility.constraintAreaMaxY = 240m
*.host[5].mobility.constraintAreaMinY = 160m
*.host[5].mobility.constraintAreaMaxY = 240m

*.host[2].mobility.constraintAreaMinY = 260m
*.host[2].mobility.constraintAreaMaxY = 340m
*.host[6].mobility.constraintAreaMinY = 260m
*.host[6].mobility.constraintAreaMaxY = 340m

*.host[3].mobility.constraintAreaMinY = 365m
*.host[3].mobility.constraintAreaMaxY = 435m
*.host[7].mobility.constraintAreaMinY = 365m
*.host[7].mobility.constraintAreaMaxY = 435m

# Hemşire IP Atamaları (Static IP)
*.host[0].wlan[0].ipv4.address = "10.0.0.1"
*.host[1].wlan[0].ipv4.address = "10.0.0.2"
*.host[2].wlan[0].ipv4.address = "10.0.0.3"
*.host[3].wlan[0].ipv4.address = "10.0.0.4"
*.host[4].wlan[0].ipv4.address = "10.0.0.5"
*.host[5].wlan[0].ipv4.address = "10.0.0.6"
*.host[6].wlan[0].ipv4.address = "10.0.0.7"
*.host[7].wlan[0].ipv4.address = "10.0.0.8"


*.host[*].mobility.typename = "RectangleMobility"
*.host[*].mobility.speed = uniform(100mps, 170mps)
*.host[*].mobility.updateInterval = 100ms

*.host[*].mobility.startPos = uniform(0, 3)

# --- MONİTÖR GENEL AYARLARI ---
*.monitor[*].mobility.typename = "StationaryMobility"
*.monitor[*].mobility.constraintAreaMinZ = 0m
*.monitor[*].mobility.constraintAreaMaxZ = 30m

