# MAC onaylarını kapat (Sadece tek yönlü veri aksın)
**.wlan[*].mac.useAck = false

# Paketin hedef adres kontrolünü esnet (Adres uyuşmazlığını görmezden gelir)
**.udp.checkAddress = false
**.udp.checksumControl = false
# --- MONİTÖRLER: SİNYAL GÖNDERİCİ (UDP App) ---
*.monitor[*].numApps = 1
# Monitörlerin radyo modülünü sadece gönderim yapacak şekilde kısıtla
**.monitor[*].wlan[0].radio.receiver.ignoreInterference = true
*.monitor[*].wlan[0].mgmt.typename = "Ieee80211MgmtAdhoc"
**.monitor[*].wlan[0].radio.transmitter.headerLength = 0B
**.ipv4.ip.fragmentation = false
*.monitor[*].app[0].typename = "UdpBasicApp"
*.monitor[*].app[0].localPort = -1
# Monitörlerin bu adreslere paket göndermesi için:
*.monitor[*].app[0].destAddresses = "10.0.0.1 10.0.0.2 10.0.0.3 10.0.0.4 10.0.0.5 10.0.0.6 10.0.0.7 10.0.0.8 "
*.monitor[*].app[0].destPort = 1000
*.monitor[*].app[0].messageLength = 100B       # Küçük BLE paketleri
*.monitor[*].app[0].sendInterval = 30s 
*.monitor[*].app[0].numPacketsPerBurst = 1
*.monitor[*].app[0].source.numPacketsPerBurst = 1
*.monitor[*].app[0].count = 1
*.monitor[*].app[0].startTime = uniform(30s, 40s)



# --- HEMŞİRELER: SİNYAL ALICI (UDP Sink) ---
*.host[*].numApps = 1
*.host[*].app[0].typename = "SinkApp"          # Sadece dinlerler, cevap vermezler
*.host[*].app[0].localPort = 1000

[Config Indoor]
description = "Wireless nodes send pings inside a house"

# host
*.numMonitors = 1
*.numHosts = 2


# visualizer
*.visualizer.canvasVisualizer.physicalEnvironmentVisualizer.displayObjects = true
*.visualizer.*Visualizer.sceneVisualizer.axisLength = 50m
*.visualizer.osgVisualizer.sceneVisualizer.displayScene = true
*.visualizer.osgVisualizer.sceneVisualizer.sceneImage = "background/checkered.png"
*.visualizer.osgVisualizer.sceneVisualizer.sceneImageSize = 8m
*.visualizer.canvasVisualizer.sceneVisualizer.viewTranslation = "5000 5000"
*.visualizer.*Visualizer.mediumVisualizer.signalPropagationAnimationSpeed = 0.000001
*.visualizer.*Visualizer.mediumVisualizer.signalTransmissionAnimationSpeed = 0.0005
*.physicalEnvironment.config = xmldoc("indoor.xml")

# application
*.host[*].app[0].startTime = 0s

# wlan
*.host[*].wlan[*].radio.transmitter.power = 0.004mW
*.host[*].wlan[*].radio.receiver.sensitivity = -90dBm

# mobility
*.monitor[*].mobility.initFromDisplayString = false
*.monitor[*].mobility.constraintAreaMinX = 0m
*.monitor[*].mobility.constraintAreaMinY = 0m
*.monitor[*].mobility.constraintAreaMinZ = 0m
*.monitor[*].mobility.constraintAreaMaxX = 40m
*.monitor[*].mobility.constraintAreaMaxY = 20m
*.monitor[*].mobility.constraintAreaMaxZ = 1m
*.monitor[0].mobility.typename = "StationaryMobility"
*.monitor[0].mobility.initialX = 30m
*.monitor[0].mobility.initialY = 19m
*.monitor[*].mobility.initialZ = 0m

*.monitor[0].numApps = 1
*.monitor[0].app[0].typename = "UdpBasicApp"
*.monitor[0].app[0].destAddresses = "10.0.0.2 10.0.0.3" # Hemşire 1 ve 2
*.monitor[0].app[0].destPort = 1000
*.monitor[0].app[0].sendInterval = 10s
*.monitor[0].app[0].startTime = 15s
*.monitor[0].app[0].messageLength = 40B

# Hemşireler (Host[0..1]): Alıcı (Sadece dinlerler)
*.host[*].numApps = 1
*.host[*].app[0].typename = "UdpSink"
*.host[*].app[0].localPort = 1000


*.host[1].mobility.typename = "TurtleMobility"
*.host[1].mobility.updateInterval = 100ms
*.host[1].mobility.turtleScript = xmldoc("turtle.xml")



*.host[0].mobility.typename = "TurtleMobility"
*.host[0].mobility.updateInterval = 100ms
*.host[0].mobility.turtleScript = xmldoc("turtle2.xml")




